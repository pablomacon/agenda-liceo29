<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nueva Actividad - Liceo 29</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/estilos.css}" />
    <style>
      /* Estilos para el selector de colores circular */
      .color-circle {
        width: 35px;
        height: 35px;
        border-radius: 50%;
        cursor: pointer;
        border: 3px solid white;
        box-shadow: 0 0 3px rgba(0, 0, 0, 0.2);
        transition: all 0.2s ease;
      }
      .color-circle:hover {
        transform: scale(1.1);
      }
      .color-circle.selected {
        border-color: #212529;
        transform: scale(1.15);
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body>
    <header class="navbar-institucional">
      <div class="header-container">
        <div class="branding-block">
          <img
            th:src="@{/img/logo_Liceo_29.jpg}"
            alt="Logo L29"
            class="logo-liceo-img"
          />
          <div class="divider-vertical"></div>
          <img
            th:src="@{/img/Logo_Secundaria.png}"
            alt="DGES"
            class="logo-secundaria-header"
          />
        </div>

        <div class="titulo-liceo-central">
          <h1>Liceo N¬į29</h1>
          <span class="badge-alicia">Alicia Goyena</span>
        </div>

        <div class="portrait-block">
          <img
            th:src="@{/img/Alicia_goyena.png}"
            alt="Alicia Goyena"
            class="img-alicia-header"
          />
        </div>
      </div>
    </header>

    <main class="container mt-5 mb-5">
      <div class="card-calendario-wrapper shadow">
        <div class="p-4 border-bottom bg-light">
          <h2 class="h4 mb-0 text-verde">
            <i class="bi bi-calendar-plus-fill"></i> Registro de Nueva Actividad
          </h2>
          <p class="text-muted mb-0 small">
            Complete los datos. Recuerde el acuerdo de colores institucional.
          </p>
        </div>

        <form
          th:action="@{/eventos/guardar}"
          th:object="${evento}"
          method="post"
          class="p-4"
          id="formEvento"
        >
          <div class="row g-4">
            <div class="col-md-8">
              <label for="titulo" class="form-label fw-bold"
                >T√≠tulo de la Actividad / Tema</label
              >
              <input
                type="text"
                th:field="*{titulo}"
                class="form-control form-control-lg border-2"
                id="titulo"
                placeholder="Ej: Clase Abierta de Historia"
                required
              />
            </div>
            <div class="col-md-4">
              <label for="lugar" class="form-label fw-bold"
                >Lugar / Sal√≥n</label
              >
              <input
                type="text"
                th:field="*{lugar}"
                class="form-control border-2"
                id="lugar"
                placeholder="Ej: Sal√≥n de Actos, Laboratorio"
              />
              <small class="text-muted">Opcional</small>
            </div>
            <div class="col-md-4">
              <label for="selectorAmbito" class="form-label fw-bold"
                >√Āmbito</label
              >
              <select
                th:field="*{ambito}"
                class="form-select border-2"
                id="selectorAmbito"
              >
                <option value="INSTITUCIONAL">ūüŹõÔłŹ Institucional</option>
                <option value="DOCENTE">ūüĎ®‚ÄćūüŹę Docente</option>
                <option value="GRUPAL">ūüĎ• Grupal</option>
                <option value="TALLER">ūüé® Taller / Salida</option>
                <option value="ED_FISICA">‚öĹ Ed. F√≠sica</option>
                <option value="EVALUACION">ūüďĚ Evaluaci√≥n</option>
              </select>
            </div>

            <div class="col-md-8" id="divGrupos">
              <div
                class="d-flex justify-content-between align-items-center mb-2"
              >
                <label class="form-label fw-bold mb-0"
                  >Seleccionar Grupo(s)</label
                >
                <button
                  type="button"
                  id="btnTodos"
                  class="btn btn-outline-primary btn-sm"
                >
                  <i class="bi bi-check-all"></i> Marcar todos
                </button>
              </div>
              <div
                class="p-3 border rounded bg-white"
                style="max-height: 200px; overflow-y: auto"
              >
                <div class="row">
                  <div class="col-6 border-end">
                    <small class="text-muted d-block mb-2 fw-bold"
                      >Matutino</small
                    >
                    <div
                      th:each="g : ${ {'7¬į1', '7¬į2', '7¬į3', '8¬į1', '8¬į2', '8¬į3', '9¬į1', '9¬į2', '9¬į3', '9¬į4'} }"
                      class="form-check small"
                    >
                      <input
                        class="form-check-input check-grupo"
                        type="checkbox"
                        name="gruposArr"
                        th:value="${g}"
                        th:id="'check'+${g}"
                      />
                      <label
                        class="form-check-label"
                        th:for="'check'+${g}"
                        th:text="${g}"
                      ></label>
                    </div>
                  </div>
                  <div class="col-6">
                    <small class="text-muted d-block mb-2 fw-bold"
                      >Vespertino</small
                    >
                    <div
                      th:each="g : ${ {'7¬į4', '7¬į5', '7¬į6', '8¬į4', '8¬į5', '8¬į6', '8¬į7', '9¬į5', '9¬į6', '9¬į7'} }"
                      class="form-check small"
                    >
                      <input
                        class="form-check-input check-grupo"
                        type="checkbox"
                        name="gruposArr"
                        th:value="${g}"
                        th:id="'check'+${g}"
                      />
                      <label
                        class="form-check-label"
                        th:for="'check'+${g}"
                        th:text="${g}"
                      ></label>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-md-8 d-none" id="divOtros">
              <label for="inputOtros" class="form-label fw-bold"
                >Especificar Destinatarios</label
              >
              <input
                type="text"
                name="inputOtros"
                id="inputOtros"
                class="form-control"
                placeholder="Ej: Sala de Inform√°tica, APAL"
              />
            </div>

            <div class="col-md-4">
              <label class="form-label fw-bold"
                ><i class="bi bi-palette"></i> Color en Agenda</label
              >
              <div class="d-flex flex-wrap gap-2 mt-1">
                <input
                  type="hidden"
                  th:field="*{color}"
                  id="colorSeleccionado"
                />

                <div
                  class="color-circle selected"
                  data-color="#3788d8"
                  style="background-color: #3788d8"
                  title="Azul (Est√°ndar)"
                ></div>
                <div
                  class="color-circle"
                  data-color="#d50000"
                  style="background-color: #d50000"
                  title="Rojo (Institucional)"
                ></div>
                <div
                  class="color-circle"
                  data-color="#f4511e"
                  style="background-color: #f4511e"
                  title="Naranja"
                ></div>
                <div
                  class="color-circle"
                  data-color="#f6bf26"
                  style="background-color: #f6bf26"
                  title="Amarillo"
                ></div>
                <div
                  class="color-circle"
                  data-color="#0b8043"
                  style="background-color: #0b8043"
                  title="Verde"
                ></div>
                <div
                  class="color-circle"
                  data-color="#8e24aa"
                  style="background-color: #8e24aa"
                  title="Violeta"
                ></div>
              </div>
            </div>

            <div class="col-md-4">
              <label for="fechaInicio" class="form-label fw-bold text-success"
                >Inicio</label
              >
              <input
                type="datetime-local"
                th:field="*{fechaInicio}"
                class="form-control border-success border-2"
                id="fechaInicio"
                required
              />
            </div>

            <div class="col-md-4">
              <label for="fechaFin" class="form-label fw-bold text-danger"
                >Fin</label
              >
              <input
                type="datetime-local"
                th:field="*{fechaFin}"
                class="form-control border-danger border-2"
                id="fechaFin"
                required
              />
            </div>

            <div class="col-md-4">
              <label for="turno" class="form-label fw-bold text-primary"
                >Turno Previsto</label
              >
              <select
                th:field="*{turno}"
                class="form-select border-primary border-2"
                id="turno"
              >
                <option value="MATUTINO">Matutino</option>
                <option value="VESPERTINO">Vespertino</option>
                <option value="INTERTURNO">Interturno</option>
              </select>
            </div>
          </div>

          <div class="mt-5 d-flex justify-content-end gap-3 border-top pt-4">
            <a th:href="@{/}" class="btn btn-outline-secondary px-4">
              <i class="bi bi-x-circle"></i> Cancelar
            </a>
            <button type="submit" class="btn btn-liceo px-5 shadow">
              <i class="bi bi-check-circle-fill"></i> Registrar en Agenda
            </button>
          </div>
        </form>
      </div>
    </main>

    <script th:inline="javascript">
      const selectorAmbito = document.getElementById("selectorAmbito");
      const divGrupos = document.getElementById("divGrupos");
      const divOtros = document.getElementById("divOtros");
      const btnTodos = document.getElementById("btnTodos");
      const checks = document.querySelectorAll(".check-grupo");
      const inputColor = document.getElementById("colorSeleccionado");
      const colorCircles = document.querySelectorAll(".color-circle");

      // 1. L√≥gica para alternar campos seg√ļn √°mbito
      function actualizarCamposDestinatarios() {
        const val = selectorAmbito.value;
        if (val === "GRUPAL" || val === "ED_FISICA" || val === "EVALUACION") {
          divGrupos.classList.remove("d-none");
          divOtros.classList.add("d-none");
        } else {
          divGrupos.classList.add("d-none");
          divOtros.classList.remove("d-none");
        }
      }

      // 2. L√≥gica del bot√≥n "Marcar Todos"
      btnTodos.addEventListener("click", function () {
        const algunoMarcado = Array.from(checks).some((c) => c.checked);
        checks.forEach((c) => (c.checked = !algunoMarcado));
        this.innerHTML = !algunoMarcado
          ? '<i class="bi bi-x-square"></i> Desmarcar todos'
          : '<i class="bi bi-check-all"></i> Marcar todos';
      });

      // 3. L√≥gica para el selector de colores
      colorCircles.forEach((circle) => {
        circle.addEventListener("click", function () {
          colorCircles.forEach((c) => c.classList.remove("selected"));
          this.classList.add("selected");
          inputColor.value = this.getAttribute("data-color");
        });
      });

      document.addEventListener("DOMContentLoaded", function () {
        actualizarCamposDestinatarios();
        selectorAmbito.addEventListener(
          "change",
          actualizarCamposDestinatarios,
        );

        // Inicializar el color con el que est√© marcado como 'selected' por defecto
        const defaultColor = document
          .querySelector(".color-circle.selected")
          .getAttribute("data-color");
        inputColor.value = defaultColor;
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
